# Serves the published aptly repository (and the signing public key) to apt
# clients. Mounted into the stock nginx image at /etc/nginx/conf.d/default.conf.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Published repositories. aptly publishes under <rootDir>/public, which is
    # bind-mounted read-only from the shared aptly-data volume. Only this
    # subtree is exposed — aptly's database directory is never served.
    location / {
        root /data/aptly/public;
        autoindex on;
    }

    # The exported signing public key, for `apt` client setup. The web UI writes
    # it here whenever a key is generated/imported; nginx serves only this file
    # from the keys volume.
    location = /gpg/public.key {
        alias /data/keys/public.key;
        default_type text/plain;
    }

    # Lightweight health endpoint for orchestration.
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
