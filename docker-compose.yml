services:
  aptly:
    build: ./aptly
    image: aptly-webui-aptly
    container_name: aptly
    restart: unless-stopped
    volumes:
      - aptly-data:/data/aptly
      - gpg:/root/.gnupg
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/version"]
      interval: 30s
      timeout: 5s
      retries: 3

  webui:
    build: .
    image: aptly-webui
    container_name: aptly-webui
    restart: unless-stopped
    depends_on:
      - aptly
    ports:
      - "8000:8000"
    environment:
      # CHANGE THESE before any real deployment.
      - SECRET_KEY=${SECRET_KEY:-please-change-this-secret-key}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - APTLY_API_URL=http://aptly:8080
      - DATA_DIR=/data/webui
      - APTLY_ROOT_DIR=/data/aptly
      - PUBLIC_KEY_PATH=/data/keys/public.key
    volumes:
      - webui-data:/data/webui
      # Mounted so the UI can back up / restore aptly's state and share the keyring.
      - aptly-data:/data/aptly
      - gpg:/root/.gnupg
      # The UI exports the signing public key here for the repo server to serve.
      - repo-keys:/data/keys

  # Serves the published apt repository (and signing public key) to apt clients.
  repo:
    image: nginx:1.27-alpine
    container_name: aptly-repo
    restart: unless-stopped
    depends_on:
      - aptly
    ports:
      # Host port for apt clients. Change the left side to avoid clashing with
      # another web server (clients then use http://host:<port>/ in sources.list).
      - "${REPO_HTTP_PORT:-80}:80"
    volumes:
      - ./repo/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Read-only: only the published repo and the exported public key are served.
      - aptly-data:/data/aptly:ro
      - repo-keys:/data/keys:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  aptly-data:
  webui-data:
  gpg:
  repo-keys:
