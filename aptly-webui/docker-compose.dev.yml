version: '3.8'

# Development compose file - runs backend and frontend separately with hot reload

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_DEBUG=true
      - PORT=5000
      - APTLY_CLI=${APTLY_CLI:-aptly}
      - ESM_TOKEN=${ESM_TOKEN:-}
    volumes:
      - ${APTLY_ROOT_DIR:-/var/lib/aptly}:/var/lib/aptly:rw
      - ./backend:/app
    command: flask run --host=0.0.0.0 --port=5000 --reload
    networks:
      - dev-network

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge
