version: '3.8'

services:
  aptly-webui:
    build: .
    ports:
      - "${APTLY_WEBUI_PORT:-8080}:80"
    environment:
      - FLASK_DEBUG=false
      - PORT=5000
      - APTLY_CLI=${APTLY_CLI:-aptly}
      - ESM_TOKEN=${ESM_TOKEN:-}
    volumes:
      # Mount aptly configuration and repository data
      - ${APTLY_ROOT_DIR:-/var/lib/aptly}:/var/lib/aptly:rw
      - ${APTLY_CONFIG:-/etc/aptly.conf}:/etc/aptly.conf:ro
      # GPG keys for signing
      - ${GPG_HOME:-~/.gnupg}:/root/.gnupg:rw
    restart: unless-stopped
    networks:
      - aptly-network

networks:
  aptly-network:
    driver: bridge
