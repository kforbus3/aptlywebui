version: "3.8"

services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aptly_webui
      POSTGRES_PASSWORD: aptly_webui_secret
      POSTGRES_DB: aptly_webui
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aptly_webui"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis cache and queue
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://aptly_webui:aptly_webui_secret@db:5432/aptly_webui
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: development-secret-key-change-in-production
      ENCRYPTION_KEY: development-encryption-key-change-in-production
      DEBUG: "true"
      RELOAD: "true"
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      CORS_ORIGINS: "http://localhost:3000,http://frontend:3000"
      ENABLE_AUTO_SYNC: "true"
    volumes:
      - ./backend:/app
      - /app/.venv
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn aptly_webui.main:app --host 0.0.0.0 --port 8000 --reload"

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    command: npm run dev
    depends_on:
      - backend

  # Background worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://aptly_webui:aptly_webui_secret@db:5432/aptly_webui
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: development-secret-key-change-in-production
      ENCRYPTION_KEY: development-encryption-key-change-in-production
      DEBUG: "true"
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: rq worker --url redis://redis:6379/0

volumes:
  postgres_data:
  redis_data:
